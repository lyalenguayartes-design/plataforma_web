<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Profesor - InstitutoEdu</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root { --naranja: #D35400; --blanco: #FFFFFF; --gris-10: #F8F7F5; --gris-20: #EEECE8; --negro: #1A1917; }
    body { font-family: sans-serif; background: var(--gris-10); margin: 0; padding: 20px; color: var(--negro); }
    .header { display: flex; justify-content: space-between; align-items: center; background: var(--blanco); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    h1 { color: var(--naranja); margin: 0; }
    .btn-logout { background: #c0392b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: var(--blanco); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    h3 { border-bottom: 2px solid var(--naranja); padding-bottom: 5px; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 8px; border: 1px solid var(--gris-20); border-radius: 4px; box-sizing: border-box; }
    button.btn-primary { background: var(--naranja); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Panel del Profesor / Docente 🧑‍🏫</h1>
      <p id="bienvenida">Cargando perfil...</p>
    </div>
    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>

  <div class="grid">
    <!-- SUBIR MATERIAL A BIBLIOTECA -->
    <div class="card">
      <h3>Biblioteca Digital: Subir Material Complementario</h3>
      <form id="form-material" onsubmit="subirMaterial(event)">
        <div class="form-group">
          <label>Título del Material</label>
          <input type="text" id="m-titulo" placeholder="Ej: Guía de Ejercicios Fracciones" required>
        </div>
        <div class="form-group">
          <label>Descripción / Indicaciones</label>
          <textarea id="m-desc" placeholder="Descargar y resolver para la próxima clase..."></textarea>
        </div>
        <div class="form-group">
          <label>Enlace del Archivo (Google Drive, OneDrive o Supabase URL)</label>
          <input type="url" id="m-url" placeholder="https://..." required>
        </div>
        <button type="submit" class="btn-primary">Publicar en Biblioteca</button>
      </form>
    </div>

    <!-- VER HORARIOS -->
    <div class="card">
      <h3>Mis Horarios de Clase asignados</h3>
      <div id="lista-horarios">No hay clases registradas aún.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'TU_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'TU_SUPABASE_ANON_KEY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function verificarAcceso() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '../../index.html'; return; }
      
      const { data: usuario } = await supabase.from('usuarios').select('*').eq('id', session.user.id).single();
      if (!usuario || usuario.role !== 'profesor') {
        alert('Acceso denegado.'); window.location.href = '../../index.html';
      } else {
        document.getElementById('bienvenida').textContent = `Profesor(a): ${usuario.nombre}`;
        cargarHorarios();
      }
    }
    verificarAcceso();

    async function cargarHorarios() {
      const { data: horarios } = await supabase.from('horarios').select('*');
      if (horarios && horarios.length > 0) {
        let html = '<ul>';
        horarios.forEach(h => { html += `<li><strong>${h.materia}</strong> - ${h.dia_semana} (${h.horas})</li>`; });
        html += '</ul>';
        document.getElementById('lista-horarios').innerHTML = html;
      }
    }

    async function subirMaterial(e) {
      e.preventDefault();
      const titulo = document.getElementById('m-titulo').value;
      const descripcion = document.getElementById('m-desc').value;
      const url = document.getElementById('m-url').value;

      const { error } = await supabase.from('materiales').insert([{ titulo, descripcion, url_archivo: url }]);
      if(error) alert(error.message);
      else { alert("✓ Material subido a la biblioteca digital"); document.getElementById('form-material').reset(); }
    }

    async function cerrarSesion() { await supabase.auth.signOut(); window.location.href = '../../index.html'; }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Tutor - InstitutoEdu</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root { --naranja: #D35400; --blanco: #FFFFFF; --gris-10: #F8F7F5; --gris-20: #EEECE8; --negro: #1A1917; }
    body { font-family: sans-serif; background: var(--gris-10); margin: 0; padding: 20px; color: var(--negro); }
    .header { display: flex; justify-content: space-between; align-items: center; background: var(--blanco); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    h1 { color: var(--naranja); margin: 0; }
    .btn-logout { background: #c0392b; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: var(--blanco); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    h3 { border-bottom: 2px solid var(--naranja); padding-bottom: 5px; margin-top: 0; }
    .cuota-item { border-left: 4px solid #e74c3c; padding: 10px; background: #fdf2e9; margin-bottom: 10px; border-radius: 4px; }
    .cuota-item.pagada { border-left-color: #2ecc71; background: #e8f8f5; }
    .btn-pagar { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; float: right; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Portal de Familias y Tutores 👨‍👩‍👦</h1>
      <p id="bienvenida">Cargando portal...</p>
    </div>
    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>

  <div class="grid">
    <!-- REVISIÓN DE FINANZAS / CUOTAS -->
    <div class="card">
      <h3>Estado de Cuenta y Cuotas</h3>
      <div id="lista-cuotas">Buscando cargos pendientes...</div>
    </div>

    <!-- BIBLIOTECA DIGITAL (DESCARGAS) -->
    <div class="card">
      <h3>Biblioteca Digital (Materiales de Clase)</h3>
      <div id="lista-materiales">No hay guías disponibles en este momento.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'TU_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'TU_SUPABASE_ANON_KEY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let userId = null;

    async function verificarAcceso() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '../../index.html'; return; }
      
      userId = session.user.id;
      const { data: usuario } = await supabase.from('usuarios').select('*').eq('id', userId).single();
      if (!usuario || usuario.role !== 'tutor') {
         // Si se acaba de registrar, por defecto entra como tutor temporal
         document.getElementById('bienvenida').textContent = "Tutor: " + session.user.email;
      } else {
        document.getElementById('bienvenida').textContent = `Tutor: ${usuario.nombre}`;
      }
      cargarFinanzas();
      cargarBiblioteca();
    }
    verificarAcceso();

    async function cargarFinanzas() {
      const { data: cuotas } = await supabase.from('cuotas').select('*').eq('id_alumno', userId);
      const contenedor = document.getElementById('lista-cuotas');
      
      if (!cuotas || cuotas.length === 0) {
        contenedor.innerHTML = "<p>🎉 No registras cuotas pendientes.</p>";
        return;
      }

      let html = '';
      cuotas.forEach(c => {
        const total = c.monto_base - (c.monto_base * (c.descuento / 100));
        const esPagado = c.estado === 'Pagado';
        html += `
          <div class="cuota-item ${esPagado ? 'pagada' : ''}">
            ${!esPagado ? `<button class="btn-pagar" onclick="simularPago('${c.id}')">Simular Pago</button>` : ''}
            <strong>Monto Final: $${total}</strong> <small>(Descuento: ${c.descuento}%)</small><br>
            Estado: <strong>${c.estado}</strong>
          </div>`;
      });
      contenedor.innerHTML = html;
    }

    async function simularPago(idCuota) {
      const { error } = await supabase.from('cuotas').update({ estado: 'Pagado' }).eq('id', idCuota);
      if(error) alert(error.message);
      else { alert("✓ Pago procesado con éxito"); cargarFinanzas(); }
    }

    async function cargarBiblioteca() {
      const { data: materiales } = await supabase.from('materiales').select('*');
      const contenedor = document.getElementById('lista-materiales');
      if(materiales && materiales.length > 0) {
        let html = '<ul>';
        materiales.forEach(m => {
          html += `<li><a href="${m.url_archivo}" target="_blank" style="color: var(--naranja); font-weight:bold;">📥 Descargar: ${m.titulo}</a> - ${m.descripcion}</li>`;
        });
        html += '</ul>';
        contenedor.innerHTML = html;
      }
    }

    async function cerrarSesion() { await supabase.auth.signOut(); window.location.href = '../../index.html'; }
  </script>
</body>
</html>
